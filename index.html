<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>LicorPro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#06080a}
body{font-family:Georgia,serif}
#root{min-height:100vh}
#sp{position:fixed;inset:0;background:#06080a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999}
.sp-e{font-size:52px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.sp-t{font-size:11px;letter-spacing:6px;color:#c8964e;text-transform:uppercase}
.sp-r{width:32px;height:32px;border:3px solid #1a1208;border-top-color:#c8964e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#sp-err{color:#ff6666;font-size:11px;text-align:center;padding:0 24px;display:none}
</style>
</head>
<body>
<div id="sp"><div class="sp-e">🥃</div><div class="sp-t">LicorPro</div><div class="sp-r"></div><div id="sp-err"></div></div>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script>
(function(){try{var h=window.location.hash.slice(1);if(h&&h.startsWith('sync=')){var d=JSON.parse(decodeURIComponent(escape(atob(h.slice(5)))));if(d.pin)localStorage.setItem('pin',d.pin);if(d.employees)localStorage.setItem('employees',JSON.stringify(d.employees));if(d.shifts)localStorage.setItem('shifts',JSON.stringify(d.shifts));window.location.hash='';}}catch(e){}
var useState=React.useState;
var useEffect=React.useEffect;
var useRef=React.useRef;
var useCallback=React.useCallback;
})();
</script>
<script>
var _appScript = document.createElement('script');
_appScript.src = "https://raw.githubusercontent.com/Barschedule/Ubar/main/app2.js?v=" + Date.now();
_appScript.onload = function() {try {
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    document.getElementById('sp').style.display = 'none';
  } catch(e) {
    document.getElementById('sp-err').style.display = 'block';
    document.getElementById('sp-err').textContent = 'Error: ' + e.message;
  }
};
_appScript.onerror = function() {
  document.getElementById('sp-err').style.display = 'block';
  document.getElementById('sp-err').textContent = 'Error: No se pudo cargar App.js';
};
document.head.appendChild(_appScript);
</script>
</body>
</html>
